<!DOCTYPE html>
<html>
<head>
    <title>GeoSpot - Nearby Places Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GeoSpot demo......</h1>
        <p>Discover nearby places using your current location</p>
    </header>

    <main>
        <section class="controls">
            <button onclick="getUserLocation()">Find My Location</button>
            <button onclick="searchNearbyPlaces('restaurant')">Restaurants</button>
            <button onclick="searchNearbyPlaces('cafe')">Cafes</button>
            <button onclick="searchNearbyPlaces('hospital')">Hospitals</button>
            <button onclick="searchNearbyPlaces('atm')">ATMs</button>
            <button onclick="searchNearbyPlaces('park')">Parks</button>
        </section>

        <section class="layout">
    <div id="map"></div>

    <aside id="places-list">
        <h2>Nearby Places</h2>
        <p>Click Find My Location, then choose a category.</p>
    </aside>
</section>

<footer>
    <p>GeoSpot | Location-Based Nearby Places Finder</p>
</footer>
    </main>

    <script src="script.js"></script>

    <script async
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBHA8u-AZlqDP4QbtzqlUXTER_js6VJ9SA&libraries=places&callback=initMap">
    </script>
</body>
</html>
